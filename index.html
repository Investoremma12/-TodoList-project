<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="index.css" />
		<title>Document</title>
	</head>
	<body>
		<div class="app-container">
			<div class="todolist-add-container">
				<div>
					<input
						class="todolist-text-input"
						type="text"
						placeholder="Add text"
					/>
				</div>
				<input class="todlist-time" type="date" />
				<button class="todolist-add-button">Add</button>
			</div>

			<div class="todolist">
				<div>
					<p class="todolist-text">Forever more</p>
					<p class="todolist-date">12/19/2026</p>
				</div>

				<img src="delete.png" alt="a red delete icon" class="delete-icon" />
			</div>
		</div>
	</body>
</html>
